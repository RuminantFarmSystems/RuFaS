## This workflow will add all PRs and Issues tagged with the "SC_redesign" label to the SC_redesign GitHub Project.
## This will work for **all** such issues and pull requests. Another action [TODO: REFERENCE]
## Will be added to switch the "Status" of a Task to "Done"
## Source: https://github.com/actions/add-to-project#current-status

name: Add tasks to SC_redesign project

on:
  issues:
    types:
      - labeled
  pull_request:
    types:
      - labeled

jobs:
  add-to-project:
    name: Add Issue or PR to project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@master
        with:
          project-url: https://github.com/orgs/RuminantFarmSystems/projects/1
          # TODO: A personal access token needs to be generated by the owner of the repo
          # and that personal access token needs to be added to the "value" field of the organizations
          # secret variable "ADD_TO_PROJECT_PAT" for this to work.
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
          labeled: SC_redesign
