# This workflow will install Python dependencies and run lint with a single version of Python
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Linting

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Set up Python 3.10
      uses: actions/setup-python@v2
      with:
        python-version: "3.10"
    - id: files
      name: Set up dependency for gettting changed files
      uses: jitterbit/get-changed-files@v1
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Get all added or modified files
      run: |
        echo "FILES=$( echo ${{ steps.files.outputs.added_modified }} |
                        tr " " "\n" |
                        grep -E "\.py$" |
                        tr "\n" " ")" >> "$GITHUB_ENV"
    - name: Lint with flake8
      if: ${{ env.FILES != '' }}
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 ${{ env.FILES }}
    - name: Check for Unauthorized Changes
      run: |
        changed_files=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})
        paths_to_monitor=(
        )
        unauthorized_changes=false
        
        for path in "${paths_to_monitor[@]}"; do
          if echo "$changed_files" | grep -q "$path"; then
            unauthorized_changes=true
            break
          fi
        done

        if $unauthorized_changes; then
          echo "Unauthorized changes detected in monitored files. Review and remove these changes if they are not intended."
          exit 1
        else
          echo "No unauthorized changes detected."
        fi