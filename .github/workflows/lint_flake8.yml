# This workflow will install Python dependencies and run lint with a single version of Python
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Linting

on:
  push:
    branches: [ master, SC_redesign ]
  pull_request:
    branches: [ master, SC_redesign ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Set up Python 3.10
      uses: actions/setup-python@v2
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        # stop the build if there are any errors or warnings
        flake8 SC_redesign/ --count --show-source --statistics --max-line-length=120 --max-complexity=10
