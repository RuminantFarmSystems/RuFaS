# This workflow will install Python dependencies and run lint with a single version of Python
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Linting

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Set up Python 3.10
      uses: actions/setup-python@v2
      with:
        python-version: "3.10"
    - id: files
      name: Set up dependency for gettting changed files
      uses: jitterbit/get-changed-files@v1
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Get all added or modified files
      run: |
        echo "FILES=$( echo ${{ steps.files.outputs.added_modified }} |
                        tr " " "\n" |
                        grep -E "\.py$" |
                        tr "\n" " ")" >> "$GITHUB_ENV"
        echo "OTHER_FILES=$( echo ${{ steps.files.outputs.added_modified }} |
                        tr " " "\n" |
                        grep -E "\.txt$|\.json$|\.csv$"  |
                        tr "\n" " ")" >> "$GITHUB_ENV"
    - name: Format code with Black
      if: ${{ github.ref != 'refs/heads/main' }}
      run: |
        black --line-length=120 ${{ env.FILES }}
    - name: Commit and push formatting changes
      if: ${{ github.ref != 'refs/heads/main' }}
      env:
        BRANCH_NAME: ${{ github.head_ref || github.ref }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add -A
        git commit -m "Apply Black Formatting" --allow-empty
        git remote set-url origin https://${GITHUB_TOKEN}@github.com/${{ github.repository }}.git

        CLEAN_BRANCH_NAME=${BRANCH_NAME/refs\/heads\//}
        git push -f origin HEAD:$CLEAN_BRANCH_NAME
    - name: Lint with flake8
      if: ${{ env.FILES != '' }}
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 ${{ env.FILES }}
    - name: Check for Unauthorized Changes
      run: |
        paths_to_protect=(
          'RUFAS/scenario_manager.py'
        )
        unauthorized_changes=false
        
        for path in "${paths_to_protect[@]}"; do
          if (echo ${{ env.FILES }}; echo ${{ env.OTHER_FILES }}) | grep -q "$path"; then
            unauthorized_changes=true
            unauthorized_paths+="$path, "
          fi
        done

        if $unauthorized_changes; then
          echo "Unauthorized changes detected in protected files: ${unauthorized_paths%, }"
          echo "Review and remove these changes if they are not intended."
          exit 1
        else
          echo "No unauthorized changes detected."
        fi
