name: Formatting

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - id: files
      name: Set up dependency for getting changed files
      uses: jitterbit/get-changed-files@v1
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Get all added or modified files
      run: |
        echo "FILES=$( echo ${{ steps.files.outputs.added_modified }} |
                        tr " " "\n" |
                        grep -E "\.py$" |
                        tr "\n" " ")" >> "$GITHUB_ENV"
        echo "OTHER_FILES=$( echo ${{ steps.files.outputs.added_modified }} |
                        tr " " "\n" |
                        grep -E "\.txt$|\.json$|\.csv$"  |
                        tr "\n" " ")" >> "$GITHUB_ENV"
    - name: Format code with Black
      if: ${{ env.FILES != '' && github.ref != 'refs/heads/main' }}
      run: |
        black --config pyproject.toml ${{ env.FILES }}
    - name: Commit and push formatting changes
      if: ${{ env.FILES != '' && github.ref != 'refs/heads/main' }}
      env:
        BRANCH_NAME: ${{ github.head_ref || github.ref }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add -A
        git commit -m "Apply Black Formatting" --allow-empty
        git remote set-url origin https://${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
        CLEAN_BRANCH_NAME=${BRANCH_NAME/refs\/heads\//}
        git push -f origin HEAD:$CLEAN_BRANCH_NAME
