# This workflow will install Python dependencies, run tests with a single version of Python
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Coverage

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    # Environment setup
    - uses: actions/checkout@v2
      with:
        persist-credentials: false # otherwise, the token used is the GITHUB_TOKEN, instead of your personal token
        fetch-depth: 0 # otherwise, you will fail to push refs to dest repo
    - name: Set up Python 3.10
      uses: actions/setup-python@v2
      with:
        python-version: "3.10"

    # Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install coverage
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # https://stackoverflow.com/questions/58886293/getting-current-branch-and-commit-hash-in-github-action
    # Get the commit ID of the newest commit and save it as an environment variable
    - name: Get commit ID
      run : |
        echo "COMMIT_ID=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_ENV"

    # https://stackoverflow.com/questions/50128549/travis-configuration-of-phpcs-for-only-current-commit-files/50128977#50128977
    # Get a list of modified files in the newest commit,
    # Delete all non .py files,
    # Add indentation for each line,
    # Replace '/' with '\/' for each filepath
    # Save as an environment variable
    - name: Get modified files
      run : |
        echo "MODIFIED_FILES=$(git diff-tree --no-commit-id --name-only ${{ env.COMMIT_ID }} -r | sed 's/^/    /' | sed 's/\//\\\//g' | sed '/\.py$/!d')" >> "$GITHUB_ENV"
        if [ "${{ env.MODIFIED_FILES }}" == "" ]; then
          echo "No python files changed, skipping coverage test!"
          exit 0
        fi

    - name: Update .coveragerc
      run : |
        sed -i '5 s/^/${{ env.MODIFIED_FILES }}\n/' .github/.coveragerc

    # https://coverage.readthedocs.io/en/7.2.7/index.html
    # Run coverage test, Generate report, Save to JSON file, Set COVERAGE_PERCENTAGE extracted from JSON
    # A configuration file ".coveragerc" can be found in .github/ to customize coverage test settings
    - name: Test coverage
      run: |
        coverage run --rcfile=.github/.coveragerc
        coverage report --rcfile=.github/.coveragerc
        coverage json --rcfile=.github/.coveragerc
        echo "COVERAGE_PERCENTAGE=$( jq -r '.totals.percent_covered_display' ./.github/workflows/coverage.json )" >> "$GITHUB_ENV"
        echo "${{ env.COVERAGE_PERCENTAGE }}"

    # Generate a Shields.io static badge and update README.md coverage badge link
    - name: Update Coverage Badge
      run:
        ./.github/workflows/update_badge.sh

    # Update repository
    # https://github.com/marketplace/actions/github-commit-push
    - name: Commit & Push changes to Readme
      uses: actions-js/push@master
      with:
        message: Update coverage on Readme
        github_token: ${{ secrets.GITHUB_TOKEN }}
        branch: ${{ github.head_ref }}

    # Post a comment to current PR with the updated coverage
    - name: Comment Coverage
      env:
        URL: ${{ github.event.pull_request.comments_url }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        curl \
          -X POST \
          $URL \
          -H "Content-Type: application/json" \
          -H "Authorization: token $GITHUB_TOKEN" \
          --data '{ "body": "Current Coverage on Modified Files: ${{ env.COVERAGE_PERCENTAGE }}%" }'