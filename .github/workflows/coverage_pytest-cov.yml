# This workflow will install Python dependencies, run tests with a single version of Python
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Coverage

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    # Environment setup
    - uses: actions/checkout@v2
      with:
        persist-credentials: false # otherwise, the token used is the GITHUB_TOKEN, instead of your personal token
        fetch-depth: 0 # otherwise, you will fail to push refs to dest repo
    - name: Set up Python 3.10
      uses: actions/setup-python@v2
      with:
        python-version: "3.10"

    # Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install coverage
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # Test coverage
    # https://coverage.readthedocs.io/en/7.2.7/index.html
    - name: Run tests with coverage.py
      run:
        coverage run -m pytest

    - name: Generate coverage report and json file
      run: |
        coverage report -m
        coverage json -o ./docs/coverage/coverage.json

    - name: Generate a Shields.io static Badge and update README.md badge link
      run:
        ./docs/coverage/update_badge.sh

    # Update repository
    # https://github.com/marketplace/actions/github-commit-push
    - name: Commit & Push changes to Readme
      uses: actions-js/push@master
      with:
        message: Update coverage on Readme
        github_token: ${{ secrets.GITHUB_TOKEN }}
        branch: ${{ github.head_ref }}