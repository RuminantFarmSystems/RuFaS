name: Type Checking with Mypy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  type-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run mypy on the current branch
        run: |
          python -m mypy . 2>&1 | tee mypy_current_branch_report.txt || true
          grep -c "error:" mypy_current_branch_report.txt > mypy_current_branch_error_count.txt

      - name: Set current branch error count as output
        id: set_current_branch_error_count
        run: echo "error_count=$(cat mypy_current_branch_error_count.txt)" >> $GITHUB_OUTPUT

      - name: Checkout main branch
        if: github.ref != 'refs/heads/main'
        uses: actions/checkout@v2
        with:
          ref: main

      - name: Install dependencies for main branch
        if: github.ref != 'refs/heads/main'
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run mypy on the main branch
        if: github.ref != 'refs/heads/main'
        run: |
          python -m mypy . 2>&1 | tee mypy_main_branch_report.txt || true
          grep -c "error:" mypy_main_branch_report.txt > mypy_main_branch_error_count.txt

      - name: Set main branch error count as output
        id: set_main_branch_error_count
        if: github.ref != 'refs/heads/main'
        run: echo "error_count=$(cat mypy_main_branch_error_count.txt)" >> $GITHUB_OUTPUT

      - name: Compare mypy reports
        if: github.ref != 'refs/heads/main'
        run: |
          CURRENT_ERRORS=${{ steps.set_current_branch_error_count.outputs.error_count }}
          MAIN_ERRORS=${{ steps.set_main_branch_error_count.outputs.error_count }}
          echo "Current branch mypy errors: $CURRENT_ERRORS"
          echo "Main branch mypy errors: $MAIN_ERRORS"
          if [ $CURRENT_ERRORS -gt $MAIN_ERRORS ]; then
            echo "Mypy error count has increased from the main branch to the current branch ($MAIN_ERRORS -> $CURRENT_ERRORS)."
            exit 1
          else
            echo "No increase in mypy errors found."
          fi

      - name: Checkout current branch
        if: github.ref != 'refs/heads/main'
        uses: actions/checkout@v2
        with:
          ref: ${{ github.head_ref }}

      - name: Update Mypy badge
        run: |
          chmod +x ./.github/workflows/update_mypy_badge.sh
          ./.github/workflows/update_mypy_badge.sh ${{ steps.set_current_branch_error_count.outputs.error_count }}

      - name: Commit & Push changes to README
        uses: EndBug/add-and-commit@v7
        with:
          message: "Update mypy badge on README"
          add: "README.md"
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.head_ref }}

      - name: Post a comment to current PR with the updated mypy badge
        env:
          URL: ${{ github.event.pull_request.comments_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ github.head_ref || github.ref }}
        run: |
          MYPY_ERROR_COUNT=${{ steps.set_current_branch_error_count.outputs.error_count }}
          if [ -n "$URL" ]; then
            curl \
              -X POST $URL \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"body\": \"Mypy found $MYPY_ERROR_COUNT errors.\"}"
          fi
