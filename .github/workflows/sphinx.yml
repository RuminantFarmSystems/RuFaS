name: Build Sphinx

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Set up Python 3.10
      uses: actions/setup-python@v2
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Remove Existing .rst Files (excluding index.rst and modules.rst)
      run: find docs -maxdepth 1 -type f -name '*.rst' ! -name 'index.rst' ! -name 'modules.rst' -exec rm -f {} \;
    - name: Generate Sphinx Documentation with sphinx-apidoc
      run: sphinx-apidoc -o docs .
    - name: Build HTML from Sphinx
      run: |
        cd docs
        make clean
        make html
    - name: Commit and Push Changes
      run: |
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"
        git add .
        git commit -m "Update documentation [skip ci]"
        git push origin main
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}