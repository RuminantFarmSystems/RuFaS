name: Build Sphinx

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
      with:
        persist-credentials: false
        fetch-depth: 0
    - name: Set up Python 3.10
      uses: actions/setup-python@v2
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Remove Existing .rst Files (excluding index.rst and modules.rst)
      run: find docs -maxdepth 1 -type f -name '*.rst' ! -name 'index.rst' ! -name 'modules.rst' -exec rm -f {} \;
    - name: Generate Sphinx Documentation with sphinx-apidoc
      run: sphinx-apidoc -o docs . tests/
    - name: Build HTML from Sphinx
      run: |
        cd docs
        make clean
        make html
    - name: Commit & Push changes to Sphinx Documentation
      uses: actions-js/push@master
      with:
        message: Update Sphinx Documentation
        github_token: ${{ secrets.GITHUB_TOKEN }}
        branch: ${{ github.head_ref }}
